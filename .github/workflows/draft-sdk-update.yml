name: Draft SDK Update

on:
  schedule:
    - cron: '0 10 * * 1' # Monday 10:00 UTC (after js-sdk regen at 09:00)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: draft

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Update SDK to latest next
        run: npm install @omnixhq/ucp-js-sdk@next

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build check
        if: steps.diff.outputs.changed == 'true'
        run: npm ci && npm run build

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          VERSION=$(node -p "require('./node_modules/@omnixhq/ucp-js-sdk/package.json').version")
          git commit -m "chore: update SDK to ${VERSION}"
          git push
