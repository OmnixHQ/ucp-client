name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: No descriptive comments
        run: npm run check:comments

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Test with coverage
        run: npm run test --workspace=packages/ucp-client -- --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: packages/ucp-client/coverage/lcov.info
          fail_ci_if_error: false
