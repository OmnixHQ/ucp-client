name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Validate exports
        run: npm run check:exports

      - name: Validate package
        run: npm run check:publish

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  integration:
    name: Integration (mock server)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start mock UCP server
        run: PORT=3002 npx tsx scripts/mock-ucp-server.ts &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3002/.well-known/ucp > /dev/null && echo "Server ready" && exit 0
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Run integration test
        run: npm run test:e2e

      - name: Run adapter catchErrors integration tests
        run: INTEGRATION=true GATEWAY_URL=http://localhost:3002 npx vitest run tests/adapters-catcherrors.test.ts
